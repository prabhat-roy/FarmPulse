apiVersion: flink.apache.org/v1beta1
kind: FlinkSessionJob
metadata: { name: farmpulse-anomaly-detection, namespace: farmpulse }
spec:
  deploymentName: farmpulse-flink
  job:
    jarURI: s3://farmpulse-flink-jobs/anomaly-detection.jar
    parallelism: 6
    upgradeMode: savepoint
    args: ["--source-topic", "farmpulse.metrics.raw", "--sink-topic", "farmpulse.alerts.anomaly"]
