apiVersion: flink.apache.org/v1beta1
kind: FlinkSessionJob
metadata: { name: farmpulse-event-enrichment, namespace: farmpulse }
spec:
  deploymentName: farmpulse-flink
  job:
    jarURI: s3://farmpulse-flink-jobs/event-enrichment.jar
    parallelism: 4
    upgradeMode: savepoint
    args: ["--source-topic", "farmpulse.cdc.public.events", "--sink-topic", "farmpulse.events.enriched"]
