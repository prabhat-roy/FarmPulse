apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-planner
  namespace: farmpulse
  labels:
    app.kubernetes.io/name: flight-planner
    app.kubernetes.io/part-of: farmpulse
    farmpulse.io/domain: drones
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: flight-planner } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: flight-planner, farmpulse.io/domain: drones }
    spec:
      serviceAccountName: flight-planner
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: flight-planner
          image: harbor.farmpulse.internal/farmpulse/flight-planner:latest
          ports: [{ containerPort: 50120, name: http }]
          envFrom: [{ configMapRef: { name: flight-planner } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50120 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50120 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
