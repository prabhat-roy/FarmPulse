apiVersion: apps/v1
kind: Deployment
metadata:
  name: imagery-processor
  namespace: farmpulse
  labels:
    app.kubernetes.io/name: imagery-processor
    app.kubernetes.io/part-of: farmpulse
    farmpulse.io/domain: drones
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: imagery-processor } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: imagery-processor, farmpulse.io/domain: drones }
    spec:
      serviceAccountName: imagery-processor
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: imagery-processor
          image: harbor.farmpulse.internal/farmpulse/imagery-processor:latest
          ports: [{ containerPort: 50122, name: http }]
          envFrom: [{ configMapRef: { name: imagery-processor } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50122 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50122 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
