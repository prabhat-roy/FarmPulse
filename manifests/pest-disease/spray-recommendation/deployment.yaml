apiVersion: apps/v1
kind: Deployment
metadata:
  name: spray-recommendation
  namespace: farmpulse
  labels:
    app.kubernetes.io/name: spray-recommendation
    app.kubernetes.io/part-of: farmpulse
    farmpulse.io/domain: pest-disease
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: spray-recommendation } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: spray-recommendation, farmpulse.io/domain: pest-disease }
    spec:
      serviceAccountName: spray-recommendation
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: spray-recommendation
          image: harbor.farmpulse.internal/farmpulse/spray-recommendation:latest
          ports: [{ containerPort: 50102, name: http }]
          envFrom: [{ configMapRef: { name: spray-recommendation } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50102 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50102 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
