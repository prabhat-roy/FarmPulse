apiVersion: apps/v1
kind: Deployment
metadata:
  name: disease-alert
  namespace: farmpulse
  labels:
    app.kubernetes.io/name: disease-alert
    app.kubernetes.io/part-of: farmpulse
    farmpulse.io/domain: pest-disease
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: disease-alert } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: disease-alert, farmpulse.io/domain: pest-disease }
    spec:
      serviceAccountName: disease-alert
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: disease-alert
          image: harbor.farmpulse.internal/farmpulse/disease-alert:latest
          ports: [{ containerPort: 50101, name: http }]
          envFrom: [{ configMapRef: { name: disease-alert } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50101 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50101 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
