apiVersion: apps/v1
kind: Deployment
metadata:
  name: insurance-service
  namespace: farmpulse
  labels:
    app.kubernetes.io/name: insurance-service
    app.kubernetes.io/part-of: farmpulse
    farmpulse.io/domain: finance
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: insurance-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: insurance-service, farmpulse.io/domain: finance }
    spec:
      serviceAccountName: insurance-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: insurance-service
          image: harbor.farmpulse.internal/farmpulse/insurance-service:latest
          ports: [{ containerPort: 50261, name: http }]
          envFrom: [{ configMapRef: { name: insurance-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50261 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50261 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
