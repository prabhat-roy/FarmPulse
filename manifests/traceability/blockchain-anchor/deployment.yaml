apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockchain-anchor
  namespace: farmpulse
  labels:
    app.kubernetes.io/name: blockchain-anchor
    app.kubernetes.io/part-of: farmpulse
    farmpulse.io/domain: traceability
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: blockchain-anchor } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: blockchain-anchor, farmpulse.io/domain: traceability }
    spec:
      serviceAccountName: blockchain-anchor
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: blockchain-anchor
          image: harbor.farmpulse.internal/farmpulse/blockchain-anchor:latest
          ports: [{ containerPort: 50222, name: http }]
          envFrom: [{ configMapRef: { name: blockchain-anchor } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50222 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50222 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
