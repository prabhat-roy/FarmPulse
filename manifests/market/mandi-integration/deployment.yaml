apiVersion: apps/v1
kind: Deployment
metadata:
  name: mandi-integration
  namespace: farmpulse
  labels:
    app.kubernetes.io/name: mandi-integration
    app.kubernetes.io/part-of: farmpulse
    farmpulse.io/domain: market
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: mandi-integration } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: mandi-integration, farmpulse.io/domain: market }
    spec:
      serviceAccountName: mandi-integration
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: mandi-integration
          image: harbor.farmpulse.internal/farmpulse/mandi-integration:latest
          ports: [{ containerPort: 50242, name: http }]
          envFrom: [{ configMapRef: { name: mandi-integration } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50242 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50242 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
