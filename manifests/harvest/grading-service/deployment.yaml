apiVersion: apps/v1
kind: Deployment
metadata:
  name: grading-service
  namespace: farmpulse
  labels:
    app.kubernetes.io/name: grading-service
    app.kubernetes.io/part-of: farmpulse
    farmpulse.io/domain: harvest
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: grading-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: grading-service, farmpulse.io/domain: harvest }
    spec:
      serviceAccountName: grading-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: grading-service
          image: harbor.farmpulse.internal/farmpulse/grading-service:latest
          ports: [{ containerPort: 50201, name: http }]
          envFrom: [{ configMapRef: { name: grading-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50201 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50201 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
