apiVersion: apps/v1
kind: Deployment
metadata:
  name: cold-chain
  namespace: farmpulse
  labels:
    app.kubernetes.io/name: cold-chain
    app.kubernetes.io/part-of: farmpulse
    farmpulse.io/domain: harvest
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: cold-chain } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: cold-chain, farmpulse.io/domain: harvest }
    spec:
      serviceAccountName: cold-chain
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: cold-chain
          image: harbor.farmpulse.internal/farmpulse/cold-chain:latest
          ports: [{ containerPort: 50202, name: http }]
          envFrom: [{ configMapRef: { name: cold-chain } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50202 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50202 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
