apiVersion: apps/v1
kind: Deployment
metadata:
  name: feed-optimizer
  namespace: farmpulse
  labels:
    app.kubernetes.io/name: feed-optimizer
    app.kubernetes.io/part-of: farmpulse
    farmpulse.io/domain: livestock
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: feed-optimizer } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: feed-optimizer, farmpulse.io/domain: livestock }
    spec:
      serviceAccountName: feed-optimizer
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: feed-optimizer
          image: harbor.farmpulse.internal/farmpulse/feed-optimizer:latest
          ports: [{ containerPort: 50142, name: http }]
          envFrom: [{ configMapRef: { name: feed-optimizer } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50142 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50142 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
