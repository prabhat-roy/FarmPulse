apiVersion: apps/v1
kind: Deployment
metadata:
  name: maintenance-scheduler
  namespace: farmpulse
  labels:
    app.kubernetes.io/name: maintenance-scheduler
    app.kubernetes.io/part-of: farmpulse
    farmpulse.io/domain: machinery
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: maintenance-scheduler } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: maintenance-scheduler, farmpulse.io/domain: machinery }
    spec:
      serviceAccountName: maintenance-scheduler
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: maintenance-scheduler
          image: harbor.farmpulse.internal/farmpulse/maintenance-scheduler:latest
          ports: [{ containerPort: 50162, name: http }]
          envFrom: [{ configMapRef: { name: maintenance-scheduler } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50162 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50162 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
