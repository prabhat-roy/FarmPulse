apiVersion: apps/v1
kind: Deployment
metadata:
  name: satellite-analytics
  namespace: farmpulse
  labels:
    app.kubernetes.io/name: satellite-analytics
    app.kubernetes.io/part-of: farmpulse
    farmpulse.io/domain: analytics
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: satellite-analytics } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: satellite-analytics, farmpulse.io/domain: analytics }
    spec:
      serviceAccountName: satellite-analytics
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: satellite-analytics
          image: harbor.farmpulse.internal/farmpulse/satellite-analytics:latest
          ports: [{ containerPort: 50282, name: http }]
          envFrom: [{ configMapRef: { name: satellite-analytics } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50282 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50282 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
