syntax = "proto3";
package farmpulse.machinery.v1;
import "google/protobuf/timestamp.proto";
option java_package = "com.farmpulse.machinery.v1";
option java_multiple_files = true;
// fuel-tracker: Fuel consumption tracker.
service FuelTrackerService { rpc Health(HealthRequest) returns (HealthResponse); }
message HealthRequest {}
message HealthResponse { string status = 1; string version = 2; google.protobuf.Timestamp checked_at = 3; }
