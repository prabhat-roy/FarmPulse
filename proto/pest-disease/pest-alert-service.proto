syntax = "proto3";

package farmpulse.pest_disease.v1;

import "google/protobuf/timestamp.proto";

option java_package = "com.farmpulse.pest_disease.v1";
option java_multiple_files = true;

// pest-alert-service: Pest/disease alert dispatcher.
service PestAlertService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
