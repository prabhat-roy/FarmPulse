syntax = "proto3";
package farmpulse.inputs.v1;
import "google/protobuf/timestamp.proto";
option java_package = "com.farmpulse.inputs.v1";
option java_multiple_files = true;
// inventory-service: Farm-store inventory.
service InventoryService { rpc Health(HealthRequest) returns (HealthResponse); }
message HealthRequest {}
message HealthResponse { string status = 1; string version = 2; google.protobuf.Timestamp checked_at = 3; }
