syntax = "proto3";
package farmpulse.market.v1;
import "google/protobuf/timestamp.proto";
option java_package = "com.farmpulse.market.v1";
option java_multiple_files = true;
// price-service: Commodity price prediction (LSTM).
service PriceService { rpc Health(HealthRequest) returns (HealthResponse); }
message HealthRequest {}
message HealthResponse { string status = 1; string version = 2; google.protobuf.Timestamp checked_at = 3; }
