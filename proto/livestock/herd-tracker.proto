syntax = "proto3";
package farmpulse.livestock.v1;
import "google/protobuf/timestamp.proto";
option java_package = "com.farmpulse.livestock.v1";
option java_multiple_files = true;
// herd-tracker: Herd GPS/RFID tracker.
service HerdTrackerService { rpc Health(HealthRequest) returns (HealthResponse); }
message HealthRequest {}
message HealthResponse { string status = 1; string version = 2; google.protobuf.Timestamp checked_at = 3; }
