syntax = "proto3";
package farmpulse.livestock.v1;
import "google/protobuf/timestamp.proto";
option java_package = "com.farmpulse.livestock.v1";
option java_multiple_files = true;
// breeding-service: Breeding programme tracker.
service BreedingService { rpc Health(HealthRequest) returns (HealthResponse); }
message HealthRequest {}
message HealthResponse { string status = 1; string version = 2; google.protobuf.Timestamp checked_at = 3; }
