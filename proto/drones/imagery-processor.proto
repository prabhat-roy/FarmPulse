syntax = "proto3";
package farmpulse.drones.v1;
import "google/protobuf/timestamp.proto";
option java_package = "com.farmpulse.drones.v1";
option java_multiple_files = true;
// imagery-processor: Orthomosaic + imagery processor (OpenDroneMap).
service ImageryProcessorService { rpc Health(HealthRequest) returns (HealthResponse); }
message HealthRequest {}
message HealthResponse { string status = 1; string version = 2; google.protobuf.Timestamp checked_at = 3; }
