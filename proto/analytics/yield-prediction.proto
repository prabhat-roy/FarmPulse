syntax = "proto3";
package farmpulse.analytics.v1;
import "google/protobuf/timestamp.proto";
option java_package = "com.farmpulse.analytics.v1";
option java_multiple_files = true;
// yield-prediction: Yield prediction (ensemble).
service YieldPredictionService { rpc Health(HealthRequest) returns (HealthResponse); }
message HealthRequest {}
message HealthResponse { string status = 1; string version = 2; google.protobuf.Timestamp checked_at = 3; }
