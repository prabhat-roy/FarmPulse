syntax = "proto3";
package farmpulse.identity.v1;
import "google/protobuf/timestamp.proto";
option java_package = "com.farmpulse.identity.v1";
option java_multiple_files = true;
// kyc-service: Farmer KYC + Aadhaar e-KYC.
service KycService { rpc Health(HealthRequest) returns (HealthResponse); }
message HealthRequest {}
message HealthResponse { string status = 1; string version = 2; google.protobuf.Timestamp checked_at = 3; }
