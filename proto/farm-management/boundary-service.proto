syntax = "proto3";

package farmpulse.farm_management.v1;

import "common/types.proto";
import "google/protobuf/timestamp.proto";

option java_package = "com.farmpulse.farm_management.v1";
option java_multiple_files = true;

// boundary-service: Field boundary GeoJSON / PostGIS.
service BoundaryService {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc GetBoundary(GetBoundaryRequest) returns (GetBoundaryResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}

message GetBoundaryRequest {
  farmpulse.common.v1.FieldId field_id = 1;
}

message GetBoundaryResponse {
  farmpulse.common.v1.GeoFeature feature = 1;
}
