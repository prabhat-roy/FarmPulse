syntax = "proto3";
package farmpulse.notifications.v1;
import "google/protobuf/timestamp.proto";
option java_package = "com.farmpulse.notifications.v1";
option java_multiple_files = true;
// push-service: FCM/APNs push.
service PushService { rpc Health(HealthRequest) returns (HealthResponse); }
message HealthRequest {}
message HealthResponse { string status = 1; string version = 2; google.protobuf.Timestamp checked_at = 3; }
