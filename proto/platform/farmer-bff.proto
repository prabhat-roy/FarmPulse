syntax = "proto3";

package farmpulse.platform.v1;

import "common/types.proto";
import "google/protobuf/timestamp.proto";

option java_package = "com.farmpulse.platform.v1";
option java_multiple_files = true;

// farmer-bff: BFF for Flutter farmer mobile (offline-first, CRDT sync).
service FarmerBffService {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc SyncDelta(SyncDeltaRequest) returns (SyncDeltaResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}

message SyncDeltaRequest {
  string device_id = 1;
  string last_sync_token = 2;
  bytes crdt_payload = 3;
}

message SyncDeltaResponse {
  string next_sync_token = 1;
  bytes server_delta = 2;
  int32 conflict_count = 3;
}
