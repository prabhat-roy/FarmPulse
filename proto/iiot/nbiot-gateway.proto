syntax = "proto3";
package farmpulse.iiot.v1;
import "google/protobuf/timestamp.proto";
option java_package = "com.farmpulse.iiot.v1";
option java_multiple_files = true;
// nbiot-gateway: NB-IoT gateway.
service NbiotGatewayService { rpc Health(HealthRequest) returns (HealthResponse); }
message HealthRequest {}
message HealthResponse { string status = 1; string version = 2; google.protobuf.Timestamp checked_at = 3; }
