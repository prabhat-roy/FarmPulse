syntax = "proto3";
package farmpulse.finance.v1;
import "google/protobuf/timestamp.proto";
option java_package = "com.farmpulse.finance.v1";
option java_multiple_files = true;
// insurance-service: Crop insurance (PMFBY).
service InsuranceService { rpc Health(HealthRequest) returns (HealthResponse); }
message HealthRequest {}
message HealthResponse { string status = 1; string version = 2; google.protobuf.Timestamp checked_at = 3; }
