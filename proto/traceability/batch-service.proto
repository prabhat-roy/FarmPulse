syntax = "proto3";
package farmpulse.traceability.v1;
import "google/protobuf/timestamp.proto";
option java_package = "com.farmpulse.traceability.v1";
option java_multiple_files = true;
// batch-service: Batch lifecycle (GS1).
service BatchService { rpc Health(HealthRequest) returns (HealthResponse); }
message HealthRequest {}
message HealthResponse { string status = 1; string version = 2; google.protobuf.Timestamp checked_at = 3; }
