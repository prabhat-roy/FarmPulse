apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: { name: farmpulse-root, namespace: argocd }
spec:
  project: default
  source:
    repoURL: https://github.com/prabhat-roy/FarmPulse.git
    targetRevision: HEAD
    path: gitops/argocd/applicationsets
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated: { prune: true, selfHeal: true }
