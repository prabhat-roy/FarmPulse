# The Things Stack — open LoRaWAN network server
image: { repository: thethingsnetwork/lorawan-stack, tag: 3.32.0 }
postgresql: { enabled: true }
redis:      { enabled: true }
ingress:
  enabled: true
  hosts: [{ host: lns.farmpulse.internal }]
