# FarmPulse — local development stack
# `make compose-up` brings up the full data-plane: Postgres+PostGIS, TimescaleDB, InfluxDB,
# MongoDB, Redis, Cassandra, Kafka+Schema Registry, NATS JetStream, MQTT (Mosquitto),
# MinIO, Keycloak, Vault, observability stack.

version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: farmpulse-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 3s
      retries: 10

  timescaledb:
    image: timescale/timescaledb-ha:pg16
    container_name: farmpulse-timescale
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: telemetry
    ports: ["5433:5432"]
    volumes: ["timescale-data:/var/lib/postgresql/data"]

  influxdb:
    image: influxdb:2.7
    container_name: farmpulse-influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminadmin
      DOCKER_INFLUXDB_INIT_ORG: farmpulse
      DOCKER_INFLUXDB_INIT_BUCKET: drone
    ports: ["8086:8086"]
    volumes: ["influxdb-data:/var/lib/influxdb2"]

  mongodb:
    image: mongo:8.0
    container_name: farmpulse-mongo
    ports: ["27017:27017"]
    volumes: ["mongo-data:/data/db"]

  redis:
    image: redis:7-alpine
    container_name: farmpulse-redis
    ports: ["6379:6379"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes: ["redis-data:/data"]

  cassandra:
    image: cassandra:5.0
    container_name: farmpulse-cassandra
    ports: ["9042:9042"]
    environment:
      CASSANDRA_CLUSTER_NAME: farmpulse
    volumes: ["cassandra-data:/var/lib/cassandra"]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: farmpulse-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: farmpulse-kafka
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    container_name: farmpulse-schema-registry
    depends_on: [kafka]
    ports: ["8081:8081"]
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092

  nats:
    image: nats:2.10-alpine
    container_name: farmpulse-nats
    command: ["-js", "-m", "8222"]
    ports: ["4222:4222", "8222:8222"]

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: farmpulse-mqtt
    ports: ["1883:1883", "8883:8883", "9001:9001"]
    volumes:
      - "./messaging/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro"
      - "mqtt-data:/mosquitto/data"

  minio:
    image: minio/minio:latest
    container_name: farmpulse-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9002:9001"]
    volumes: ["minio-data:/data"]

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: farmpulse-keycloak
    command: ["start-dev"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports: ["8080:8080"]

  vault:
    image: hashicorp/vault:1.17
    container_name: farmpulse-vault
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports: ["8200:8200"]

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: farmpulse-prometheus
    ports: ["9090:9090"]
    volumes: ["./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"]

  grafana:
    image: grafana/grafana:11.2.0
    container_name: farmpulse-grafana
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin

  loki:
    image: grafana/loki:3.2.0
    container_name: farmpulse-loki
    ports: ["3100:3100"]

  jaeger:
    image: jaegertracing/all-in-one:1.61
    container_name: farmpulse-jaeger
    ports: ["16686:16686", "4317:4317", "4318:4318"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: farmpulse-otel
    command: ["--config=/etc/otel-collector.yaml"]
    volumes: ["./observability/otel-collector/otel-collector.yaml:/etc/otel-collector.yaml:ro"]
    ports: ["4319:4317"]

  ttn-stack:
    image: thethingsnetwork/lorawan-stack:latest
    container_name: farmpulse-ttn
    ports: ["1885:1885", "8884:8884"]
    environment:
      TTN_LW_LOG_LEVEL: info

volumes:
  postgres-data:
  timescale-data:
  influxdb-data:
  mongo-data:
  redis-data:
  cassandra-data:
  minio-data:
  mqtt-data:
